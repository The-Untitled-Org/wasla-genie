name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/visualizer/package-lock.json

      - name: Validate release metadata
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const tag = process.env.RELEASE_TAG;
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const expectedTag = `v${pkg.version}`;
          const expectedHeading = `## [${pkg.version}]`;

          if (tag !== expectedTag) {
            throw new Error(`Release tag ${tag} does not match package.json version ${pkg.version}. Expected ${expectedTag}.`);
          }

          if (lock.version !== pkg.version || lock.packages?.['']?.version !== pkg.version) {
            throw new Error(`package-lock.json version does not match package.json version ${pkg.version}. Run npm version <patch|minor|major> --no-git-tag-version.`);
          }

          if (!changelog.includes(expectedHeading)) {
            throw new Error(`CHANGELOG.md is missing a ${expectedHeading} release heading.`);
          }
          NODE

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix apps/visualizer ci

      - name: Publish to NPM
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published. Skipping npm publish."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node scripts/release.mjs release-notes "$RELEASE_TAG" > release-notes.md

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists. Skipping creation."
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          fi
